<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#315b2d">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>Orchardia Online Engine V1.9 — Smart Auto & Combat HUD Fix</title>
  <link rel="stylesheet" href="style.css?v=300">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="player-card">
      <div class="avatar">SR</div>
      <div class="player-info">
        <div class="player-name">Lv.<span id="levelValue">1</span> Seed Ranger</div>
        <div class="mini-bar hpbar"><span id="hpFill"></span><b id="hpText">100/100</b></div>
        <div class="mini-bar mpbar"><span id="mpFill"></span><b id="mpText">100/100</b></div>
        <div class="mini-bar xpbar"><span id="xpFill"></span><b>EXP</b></div>
      </div>
    </div>

    <div class="currency-stack">
      <div class="currency">🪙 <span id="coins">0</span></div>
      <div class="currency">💎 <span id="items">0</span></div>
      <button id="bagBtn" class="square-menu">🎒</button>
      <button id="menuBtn" class="exit-btn">☰</button>
    </div>

    <div class="minimap">
      <div class="map-ring"></div>
      <div class="map-arrow">▲</div>
      <div class="map-dot a"></div>
      <div class="map-dot b"></div>
      <div class="map-dot c"></div>
    </div>

    <div class="quest-card">
      <div class="quest-icon">!</div>
      <div>
        <b>ภารกิจหลัก</b>
        <div id="questText">กำจัดตั๊กแตน <span id="questCount">0</span>/5</div>
      </div>
      <button id="questToggleBtn" class="quest-arrow">›</button>
    </div>

    <div class="utility-rail">
      <button id="bagBtnSide" class="utility-btn">🎒<span>กระเป๋า</span></button>
      <button id="shopQuickBtn" class="utility-btn">🛒<span>ร้านค้า</span></button>
      <button id="questQuickBtn" class="utility-btn">📜<span>เควสต์</span></button>
      <button id="lockBtn" class="utility-btn">🎯<span>ล็อกเป้า</span></button>
    </div>

    <div id="message"></div>

    <div id="joystick"><div id="stick"></div></div>

    <div id="target" class="target-chip">เป้าหมาย: ไม่มี</div>
    <div id="hint" class="hint-chip">ลากพื้นที่ว่างเพื่อหมุนกล้อง</div>

    <div class="combat-cluster">
      <button id="skillBtn" class="skill-btn blue"><span class="icon">✦</span><small>สกิล 1</small></button>
      <button id="attackBtn" class="attack-btn"><span class="icon">⚔</span><small>โจมตี</small></button>
      <button id="skill2Btn" class="skill-btn orange"><span class="icon">✹</span><small>สกิล 2</small></button>
      <button id="rollBtn" class="skill-btn green"><span class="icon">➜</span><small>กลิ้ง</small></button>
      <button id="interactBtn" class="skill-btn purple interact"><span class="icon">💬</span><small>คุย</small></button>
      <button id="autoBtn" class="auto-btn"><span class="auto-icon">⚔</span><span class="auto-label">ออโต้</span></button>
      <button id="autoSkillBtn" class="auto-skill-btn">สกิลออโต้ ON</button>
      <button id="hideCombatBtn" class="hide-combat-btn">ซ่อนปุ่ม</button>
    </div>
  </div>

  <div id="targetBossBar" class="target-boss hidden">
    <div class="target-name-row">
      <span id="targetName">เป้าหมาย</span>
      <span id="targetDistance">0m</span>
    </div>
    <div class="target-hp-track"><span id="targetHpFill"></span></div>
  </div>
  <div id="combatFeedback" class="combat-feedback"></div>
  <div id="zoneBanner" class="zone-banner hidden">
    <b id="zoneName">Seedling Village</b>
    <small id="zoneLevel">Lv.1–10</small>
  </div>
  <button id="showCombatBtn" class="show-combat-btn hidden">⚔ แสดงปุ่ม</button>
  <div id="lowHpWarning" class="low-hp-warning"></div>
  <div id="gameMenuPanel" class="window game-menu hidden">
    <div class="window-head">
      <b>เมนูเกม</b>
      <button id="closeGameMenuBtn">✕</button>
    </div>
    <div class="menu-grid">
      <button id="resumeBtn">เล่นต่อ</button>
      <button id="menuBagBtn">กระเป๋า</button>
      <button id="menuAutoBtn">AUTO</button>
      <button id="exitBtn">ออกจากเกม</button>
    </div>
  </div>

  <div id="inventoryPanel" class="window hidden">
    <div class="window-head">
      <b>กระเป๋านักผจญภัย</b>
      <button id="closeInventoryBtn">✕</button>
    </div>
    <div class="stats-grid">
      <div>พลังโจมตี <b id="attackStat">22</b></div>
      <div>HP สูงสุด <b id="maxHpStat">100</b></div>
      <div>ยา HP <b id="potionCount">0</b></div>
      <div>เมล็ดหายาก <b id="seedCount">0</b></div>
    </div>
    <div class="inventory-actions">
      <button id="usePotionBtn">ใช้ยา HP</button>
      <button id="upgradeWeaponBtn">อัปเกรดธนู 80 🪙</button>
    </div>
  </div>

  <div id="dialoguePanel" class="window dialogue hidden">
    <div class="window-head">
      <b id="dialogueName">ผู้ดูแลสวน</b>
      <button id="closeDialogueBtn">✕</button>
    </div>
    <p id="dialogueText"></p>
    <div id="dialogueActions" class="inventory-actions"></div>
  </div>

  <div id="errorBox"></div>
  <script src="game.js?v=300"></script>
</body>
</html>
